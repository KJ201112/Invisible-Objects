name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build-android32:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: geode-sdk/build-geode-mod@main
        with:
          target: Android32
          sdk: given
      - uses: actions/upload-artifact@v4
        with:
          name: build-android32
          path: "build/**/*.geode"
